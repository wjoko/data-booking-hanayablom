<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Katalog Model — Hanaya Blom</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F7F3EE;
    --warm-white: #FDFAF7;
    --blush: #E8D5C4;
    --rose: #C4956A;
    --rose-deep: #A67452;
    --sage: #8A9E8C;
    --charcoal: #2C2C2C;
    --muted: #8A8278;
    --border: #DDD5CB;
    --danger: #C0392B;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--charcoal); min-height: 100vh; padding-bottom: 60px; }
  .header { background: var(--charcoal); padding: 16px 20px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 200; }
  .header-brand { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 20px; color: var(--cream); flex: 1; }
  .header-brand span { color: var(--rose); font-style: normal; font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; display: block; font-family: 'DM Sans', sans-serif; }
  .setup-banner { background: #FFF3CD; border-bottom: 1px solid #F0D060; padding: 10px 16px; font-size: 12px; color: #7D5A00; display: flex; align-items: center; gap: 8px; }
  .setup-banner input { flex: 1; padding: 6px 10px; border: 1px solid #F0D060; border-radius: 6px; font-size: 12px; font-family: 'DM Sans', sans-serif; background: white; }
  .setup-banner button { padding: 6px 14px; background: var(--rose); color: white; border: none; border-radius: 6px; font-size: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; }
  .toolbar { padding: 14px 16px; background: var(--warm-white); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .toolbar-title { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-style: italic; }
  .btn-add { background: var(--rose); color: white; border: none; border-radius: 8px; padding: 9px 18px; font-size: 13px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; }
  .btn-add:hover { background: var(--rose-deep); }
  .btn-setting { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.7); padding: 7px 10px; border-radius: 6px; font-size: 15px; cursor: pointer; line-height: 1; }
  .settings-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
  .settings-overlay.open { display: flex; }
  .settings-box { background: var(--warm-white); border-radius: 16px; padding: 24px 20px; width: 100%; max-width: 420px; }
  .settings-box h3 { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-style: italic; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }
  .settings-box h3 button { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--muted); }
  .settings-box label { display: block; font-size: 11px; font-weight: 500; letter-spacing: 0.07em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .settings-box input { width: 100%; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--charcoal); background: var(--cream); outline: none; }
  .settings-box input:focus { border-color: var(--rose); }
  .settings-url-info { font-size: 11px; color: var(--muted); margin-top: 5px; word-break: break-all; }
  .btn-save-settings { width: 100%; margin-top: 16px; padding: 13px; background: var(--rose); color: white; border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; }
  .katalog-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 14px 16px; }
  .katalog-card { background: var(--warm-white); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .katalog-img { width: 100%; aspect-ratio: 4/3; background: linear-gradient(135deg, var(--blush), var(--cream)); display: flex; align-items: center; justify-content: center; font-size: 30px; overflow: hidden; }
  .katalog-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .katalog-info { padding: 10px 12px; }
  .katalog-nama { font-size: 13px; font-weight: 500; }
  .katalog-harga { font-size: 12px; color: var(--rose); font-weight: 500; margin-top: 2px; }
  .katalog-ket { font-size: 11px; color: var(--muted); margin-top: 3px; line-height: 1.4; }
  .katalog-actions { padding: 8px 12px; border-top: 1px solid var(--border); display: flex; gap: 6px; justify-content: flex-end; }
  .action-btn { padding: 5px 12px; border-radius: 6px; font-size: 12px; font-family: 'DM Sans', sans-serif; cursor: pointer; border: 1.5px solid var(--border); background: transparent; color: var(--charcoal); transition: all 0.15s; }
  .action-btn.edit { border-color: var(--rose); color: var(--rose); }
  .action-btn.edit:hover { background: var(--rose); color: white; }
  .action-btn.del { border-color: var(--danger); color: var(--danger); }
  .action-btn.del:hover { background: var(--danger); color: white; }
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 13px; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 999; align-items: flex-end; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--warm-white); width: 100%; max-width: 480px; max-height: 92vh; border-radius: 20px 20px 0 0; overflow-y: auto; padding: 20px 18px 40px; }
  .modal-title { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-style: italic; margin-bottom: 18px; display: flex; align-items: center; justify-content: space-between; }
  .modal-close { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--muted); }
  .fg { margin-bottom: 14px; }
  .fg label { display: block; font-size: 11px; font-weight: 500; letter-spacing: 0.07em; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
  .fg input, .fg textarea { width: 100%; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--charcoal); background: var(--cream); outline: none; }
  .fg input:focus, .fg textarea:focus { border-color: var(--rose); }
  .fg textarea { resize: vertical; min-height: 70px; }
  .fg .helper { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .upload-area { width: 100%; aspect-ratio: 4/3; border: 2px dashed var(--border); border-radius: 10px; overflow: hidden; background: var(--cream); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; cursor: pointer; transition: border-color 0.2s; margin-bottom: 10px; position: relative; }
  .upload-area:hover { border-color: var(--rose); }
  .upload-area.has-img { border-style: solid; border-color: var(--rose); }
  .upload-area img { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; }
  .upload-area input[type="file"] { display: none; }
  .upload-icon { font-size: 28px; position: relative; z-index: 1; }
  .upload-text { font-size: 12px; color: var(--muted); position: relative; z-index: 1; text-align: center; }
  .upload-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.45); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; z-index: 2; }
  .upload-area.has-img:hover .upload-overlay { opacity: 1; }
  .upload-overlay span { color: white; font-size: 12px; font-weight: 500; }
  .upload-progress { width: 100%; height: 3px; background: var(--border); border-radius: 2px; margin-bottom: 10px; display: none; }
  .upload-progress-bar { height: 100%; background: var(--rose); border-radius: 2px; width: 0%; transition: width 0.3s; }
  .modal-actions { display: flex; gap: 8px; margin-top: 20px; }
  .btn-save { flex: 1; padding: 13px; background: var(--rose); color: white; border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; }
  .btn-cancel { padding: 13px 20px; background: var(--cream); border: 1.5px solid var(--border); border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer; color: var(--muted); }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--charcoal); color: var(--cream); padding: 12px 24px; border-radius: 30px; font-size: 13px; font-weight: 500; z-index: 9999; transition: transform 0.3s, opacity 0.3s; opacity: 0; white-space: nowrap; pointer-events: none; }
  .toast.success { border-left: 4px solid var(--sage); }
  .toast.error { border-left: 4px solid var(--danger); }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
</style>
</head>
<body>

<div id="toast" class="toast"></div>

<div class="header">
  <div class="header-brand">
    <span>Katalog Model</span>
    Hanaya Blom
  </div>
  <button class="btn-setting" onclick="openSettings()" title="Settings">⚙️</button>
</div>

<!-- Settings Modal -->
<div class="settings-overlay" id="settingsOverlay">
  <div class="settings-box">
    <h3>Pengaturan <button onclick="closeSettings()">✕</button></h3>
    <label>URL Apps Script</label>
    <input type="text" id="urlInput" placeholder="https://script.google.com/macros/s/...">
    <div class="settings-url-info" id="urlInfo"></div>
    <button class="btn-save-settings" onclick="saveUrl()">Simpan & Muat Ulang</button>
  </div>
</div>

<div class="toolbar">
  <div class="toolbar-title">Model Dekorasi</div>
  <button class="btn-add" onclick="openModal()">+ Tambah Model</button>
</div>

<div id="katalogGrid" class="katalog-grid">
  <div class="empty" style="grid-column:1/-1">Memuat katalog...</div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title">
      <span id="modalTitle">Tambah Model</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <input type="hidden" id="editRowIndex">
    <input type="hidden" id="savedFotoUrl">

    <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
      <input type="file" id="fileInput" accept="image/*" onchange="handleFileSelect(event)">
      <span class="upload-icon">📷</span>
      <div class="upload-text">Tap untuk pilih foto<br><small>dari HP atau PC</small></div>
      <div class="upload-overlay"><span>Ganti foto</span></div>
    </div>
    <div class="upload-progress" id="uploadProgress">
      <div class="upload-progress-bar" id="uploadProgressBar"></div>
    </div>

    <div class="fg">
      <label>Nama Model <span style="color:var(--rose)">*</span></label>
      <input type="text" id="inputNama" placeholder="Contoh: Romantic Garden">
    </div>
    <div class="fg">
      <label>Harga (Rp)</label>
      <input type="number" id="inputHarga" placeholder="Contoh: 2500000">
      <div class="helper">Kosongkan jika harga custom</div>
    </div>
    <div class="fg">
      <label>Keterangan</label>
      <textarea id="inputKet" placeholder="Deskripsi singkat..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Batal</button>
      <button class="btn-save" id="btnSave" onclick="saveModel()">Simpan</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'hanayablom_admin_url';
let APPS_SCRIPT_URL = localStorage.getItem(STORAGE_KEY) || '';
let katalogData = [];
let isEditing = false;
let selectedFileBase64 = null;
let selectedFileMime = null;

document.addEventListener('DOMContentLoaded', () => {
  if (APPS_SCRIPT_URL) {
    loadKatalog();
  } else {
    openSettings();
    document.getElementById('katalogGrid').innerHTML = '<div class="empty" style="grid-column:1/-1">⚙️ Masukkan URL Apps Script dulu via tombol ⚙️ di pojok kanan atas.</div>';
  }
});

function openSettings() {
  const input = document.getElementById('urlInput');
  const info = document.getElementById('urlInfo');
  input.value = APPS_SCRIPT_URL || '';
  info.textContent = APPS_SCRIPT_URL ? '✓ URL tersimpan' : 'Belum ada URL tersimpan';
  document.getElementById('settingsOverlay').classList.add('open');
}

function closeSettings() {
  document.getElementById('settingsOverlay').classList.remove('open');
}

function saveUrl() {
  var val = document.getElementById('urlInput').value.trim();
  if (!val) { showToast('URL tidak boleh kosong', 'error'); return; }
  APPS_SCRIPT_URL = val;
  localStorage.setItem(STORAGE_KEY, val);
  closeSettings();
  showToast('✓ URL tersimpan');
  loadKatalog();
}

function loadKatalog() {
  const cb = 'kCb_' + Date.now();
  const s = document.createElement('script');
  const t = setTimeout(() => {
    document.getElementById('katalogGrid').innerHTML = '<div class="empty" style="grid-column:1/-1">⚠️ Gagal memuat.</div>';
    delete window[cb];
    if (s.parentNode) document.body.removeChild(s);
  }, 10000);
  window[cb] = function(json) {
    clearTimeout(t);
    delete window[cb];
    document.body.removeChild(s);
    katalogData = json.data || [];
    renderKatalog();
  };
  s.src = APPS_SCRIPT_URL + '?action=getKatalog&callback=' + cb + '&t=' + Date.now();
  document.body.appendChild(s);
}

function renderKatalog() {
  const grid = document.getElementById('katalogGrid');
  if (!katalogData.length) {
    grid.innerHTML = '<div class="empty" style="grid-column:1/-1">🌸 Belum ada model.<br>Tap <b>+ Tambah Model</b> untuk mulai.</div>';
    return;
  }
  grid.innerHTML = katalogData.map(function(d) {
    var imgUrl = convertDriveUrl(d.foto);
    var harga = d.harga ? 'Rp ' + Number(d.harga).toLocaleString('id-ID') : 'Harga custom';
    var nama = (d.nama || '').replace(/'/g, "\\'");
    return '<div class="katalog-card">' +
      '<div class="katalog-img">' + (imgUrl ? '<img src="' + imgUrl + '" onerror="this.parentElement.innerHTML=\'🌸\'">' : '🌸') + '</div>' +
      '<div class="katalog-info">' +
        '<div class="katalog-nama">' + (d.nama || '—') + '</div>' +
        '<div class="katalog-harga">' + harga + '</div>' +
        (d.keterangan ? '<div class="katalog-ket">' + d.keterangan + '</div>' : '') +
      '</div>' +
      '<div class="katalog-actions">' +
        '<button class="action-btn edit" onclick="openEdit(' + d.rowIndex + ')">✏️ Edit</button>' +
        '<button class="action-btn del" onclick="hapusModel(' + d.rowIndex + ',\'' + nama + '\')">🗑️</button>' +
      '</div>' +
    '</div>';
  }).join('');
}

function convertDriveUrl(url) {
  if (!url) return '';
  var match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if (match) return 'https://drive.google.com/uc?export=view&id=' + match[1];
  return url;
}

function handleFileSelect(event) {
  var file = event.target.files[0];
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) { showToast('Max 5MB', 'error'); return; }
  selectedFileMime = file.type;
  var reader = new FileReader();
  reader.onload = function(e) {
    selectedFileBase64 = e.target.result.split(',')[1];
    var area = document.getElementById('uploadArea');
    area.classList.add('has-img');
    area.innerHTML = '<input type="file" id="fileInput" accept="image/*" onchange="handleFileSelect(event)">' +
      '<img src="' + e.target.result + '" alt="preview">' +
      '<div class="upload-overlay"><span>📷 Ganti foto</span></div>';
  };
  reader.readAsDataURL(file);
}

function openModal() {
  isEditing = false;
  selectedFileBase64 = null;
  selectedFileMime = null;
  document.getElementById('modalTitle').textContent = 'Tambah Model';
  document.getElementById('editRowIndex').value = '';
  document.getElementById('savedFotoUrl').value = '';
  document.getElementById('inputNama').value = '';
  document.getElementById('inputHarga').value = '';
  document.getElementById('inputKet').value = '';
  resetUploadArea();
  document.getElementById('modalOverlay').classList.add('open');
}

function openEdit(rowIndex) {
  var d = katalogData.find(function(x) { return x.rowIndex === rowIndex; });
  if (!d) return;
  isEditing = true;
  selectedFileBase64 = null;
  selectedFileMime = null;
  document.getElementById('modalTitle').textContent = 'Edit Model';
  document.getElementById('editRowIndex').value = rowIndex;
  document.getElementById('savedFotoUrl').value = d.foto || '';
  document.getElementById('inputNama').value = d.nama || '';
  document.getElementById('inputHarga').value = d.harga || '';
  document.getElementById('inputKet').value = d.keterangan || '';
  var imgUrl = convertDriveUrl(d.foto);
  var area = document.getElementById('uploadArea');
  if (imgUrl) {
    area.classList.add('has-img');
    area.innerHTML = '<input type="file" id="fileInput" accept="image/*" onchange="handleFileSelect(event)">' +
      '<img src="' + imgUrl + '" onerror="this.style.display=\'none\'">' +
      '<div class="upload-overlay"><span>📷 Ganti foto</span></div>';
  } else {
    resetUploadArea();
  }
  document.getElementById('modalOverlay').classList.add('open');
}

function resetUploadArea() {
  var area = document.getElementById('uploadArea');
  area.classList.remove('has-img');
  area.innerHTML = '<input type="file" id="fileInput" accept="image/*" onchange="handleFileSelect(event)">' +
    '<span class="upload-icon">📷</span>' +
    '<div class="upload-text">Tap untuk pilih foto<br><small>dari HP atau PC</small></div>' +
    '<div class="upload-overlay"><span>Ganti foto</span></div>';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

async function saveModel() {
  var nama = document.getElementById('inputNama').value.trim();
  var harga = document.getElementById('inputHarga').value.trim();
  var existingFoto = document.getElementById('savedFotoUrl').value;
  if (!nama) { showToast('Nama model wajib diisi', 'error'); return; }
  if (!selectedFileBase64 && !existingFoto) { showToast('Pilih foto terlebih dahulu', 'error'); return; }

  var btn = document.getElementById('btnSave');
  btn.disabled = true;
  var fotoUrl = existingFoto;

  if (selectedFileBase64) {
    btn.textContent = 'Mengupload...';
    showProgress(40);
    try {
      await fetch(APPS_SCRIPT_URL, {
        method: 'POST', mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'uploadFoto', fileBase64: selectedFileBase64, mimeType: selectedFileMime, fileName: 'dekorasi_' + Date.now() })
      });
      showProgress(80);
      fotoUrl = await getLastUploadedUrl();
      showProgress(100);
    } catch(e) {
      showToast('✗ Gagal upload foto', 'error');
      btn.disabled = false; btn.textContent = 'Simpan'; hideProgress(); return;
    }
    hideProgress();
  }

  btn.textContent = 'Menyimpan...';
  var rowIndex = document.getElementById('editRowIndex').value;
  try {
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: isEditing ? 'updateKatalog' : 'insertKatalog', rowIndex: rowIndex ? Number(rowIndex) : null, nama: nama, harga: harga, foto: fotoUrl, keterangan: document.getElementById('inputKet').value, aktif: 'Ya' })
    });
    closeModal();
    showToast(isEditing ? '✓ Model diperbarui' : '✓ Model ditambahkan');
    setTimeout(function() { loadKatalog(); }, 1200);
  } catch(e) {
    showToast('✗ Gagal menyimpan', 'error');
  }
  btn.disabled = false; btn.textContent = 'Simpan';
}

function getLastUploadedUrl() {
  return new Promise(function(resolve) {
    var cb = 'uCb_' + Date.now();
    var s = document.createElement('script');
    var t = setTimeout(function() { resolve(''); delete window[cb]; if(s.parentNode) document.body.removeChild(s); }, 8000);
    window[cb] = function(json) { clearTimeout(t); delete window[cb]; document.body.removeChild(s); resolve(json.url || ''); };
    s.src = APPS_SCRIPT_URL + '?action=getLastUpload&callback=' + cb + '&t=' + Date.now();
    document.body.appendChild(s);
  });
}

function showProgress(pct) {
  document.getElementById('uploadProgress').style.display = 'block';
  document.getElementById('uploadProgressBar').style.width = pct + '%';
}
function hideProgress() {
  setTimeout(function() { document.getElementById('uploadProgress').style.display = 'none'; document.getElementById('uploadProgressBar').style.width = '0%'; }, 400);
}

async function hapusModel(rowIndex, nama) {
  if (!confirm('Hapus model "' + nama + '"?')) return;
  try {
    await fetch(APPS_SCRIPT_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'deleteKatalog', rowIndex: rowIndex }) });
    showToast('🗑️ Model dihapus');
    setTimeout(function() { loadKatalog(); }, 1000);
  } catch(e) { showToast('✗ Gagal menghapus', 'error'); }
}

function showToast(msg, type) {
  type = type || 'success';
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  setTimeout(function() { t.className = 'toast'; }, 3000);
}

document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
</script>
</body>
</html>
